<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APK to AAB Converter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f1a; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%); }
        .container { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); max-width: 520px; width: 100%; box-shadow: 0 25px 60px rgba(0,0,0,0.5); }
        h1 { color: #fff; text-align: center; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
        h1 span { background: linear-gradient(135deg, #00d4ff, #7b2ffc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sub { text-align: center; color: #8888aa; margin: 8px 0 28px; font-size: 14px; }
        .info { background: rgba(0,212,255,0.08); padding: 12px 16px; border-radius: 12px; margin-bottom: 24px; border-left: 3px solid #00d4ff; font-size: 13px; color: #aabbdd; }
        .info strong { color: #00d4ff; }
        .drop-zone { border: 2px dashed rgba(255,255,255,0.15); border-radius: 16px; padding: 30px 20px; text-align: center; cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.03); margin-bottom: 16px; }
        .drop-zone:hover { border-color: #00d4ff; background: rgba(0,212,255,0.05); }
        .drop-zone input { display: none; }
        .drop-zone .icon { font-size: 48px; margin-bottom: 8px; }
        .drop-zone p { color: #8899bb; font-size: 14px; }
        .drop-zone .file-name { color: #00d4ff; font-weight: 600; margin-top: 8px; display: none; }
        .row { display: flex; gap: 10px; margin: 12px 0; }
        .row input { flex: 1; padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: #fff; font-size: 14px; outline: none; transition: 0.3s; }
        .row input:focus { border-color: #00d4ff; background: rgba(255,255,255,0.08); }
        .row input::placeholder { color: #556677; }
        button { width: 100%; padding: 16px; border: none; border-radius: 14px; font-size: 18px; font-weight: 700; cursor: pointer; transition: 0.3s; background: linear-gradient(135deg, #00d4ff, #7b2ffc); color: #fff; margin-top: 8px; letter-spacing: 0.5px; }
        button:hover { transform: scale(1.02); box-shadow: 0 8px 30px rgba(0,212,255,0.3); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        #status { margin-top: 20px; padding: 16px; border-radius: 12px; display: none; font-size: 14px; }
        .success { background: rgba(0,255,100,0.1); border: 1px solid rgba(0,255,100,0.2); color: #66ffaa; display: block; }
        .error { background: rgba(255,50,50,0.1); border: 1px solid rgba(255,50,50,0.2); color: #ff6666; display: block; }
        .loading { background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.15); color: #66ddff; display: block; }
        #progress { margin-top: 12px; background: rgba(255,255,255,0.05); border-radius: 20px; overflow: hidden; display: none; height: 6px; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #00d4ff, #7b2ffc); transition: width 0.5s; border-radius: 20px; }
        a { color: #66ddff; text-decoration: none; font-weight: 600; }
        a:hover { text-decoration: underline; }
        .footer { text-align: center; margin-top: 24px; color: #445566; font-size: 12px; }
        .footer span { color: #00d4ff; }
        #serverStatus { color: #66ddff; }
    </style>
</head>
<body>
<div class="container">
    <h1>📱 <span>APK → AAB</span></h1>
    <p class="sub">Convert Android APK to App Bundle</p>
    <div class="info"><strong>⚡ Server:</strong> <span id="serverStatus">● Online</span></div>
    
    <form id="uploadForm" enctype="multipart/form-data">
        <div class="drop-zone" id="dropZone">
            <div class="icon">📤</div>
            <p>Drop APK here or click to browse</p>
            <input type="file" name="apk" accept=".apk" id="apkInput" required>
            <div class="file-name" id="fileName"></div>
        </div>
        
        <div class="row">
            <input type="number" name="minSdk" value="21" placeholder="Min SDK">
            <input type="number" name="targetSdk" value="33" placeholder="Target SDK">
        </div>
        
        <button type="submit" id="convertBtn">🚀 Convert to AAB</button>
    </form>
    
    <div id="progress"><div id="progress-bar"></div></div>
    <div id="status"></div>
    <div class="footer">Powered by <span>Python</span> + <span>Flask</span> on Render</div>
</div>

<script>
    const API_URL = '';
    const form = document.getElementById('uploadForm');
    const statusDiv = document.getElementById('status');
    const progressDiv = document.getElementById('progress');
    const progressBar = document.getElementById('progress-bar');
    const convertBtn = document.getElementById('convertBtn');
    const apkInput = document.getElementById('apkInput');
    const dropZone = document.getElementById('dropZone');
    const fileName = document.getElementById('fileName');

    // Drag & Drop
    dropZone.addEventListener('click', () => apkInput.click());
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.borderColor = '#00d4ff'; });
    dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = 'rgba(255,255,255,0.15)'; });
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = 'rgba(255,255,255,0.15)';
        if (e.dataTransfer.files.length) {
            apkInput.files = e.dataTransfer.files;
            updateFileName();
        }
    });
    apkInput.addEventListener('change', updateFileName);
    function updateFileName() {
        if (apkInput.files.length) {
            fileName.textContent = '📄 ' + apkInput.files[0].name;
            fileName.style.display = 'block';
        } else {
            fileName.style.display = 'none';
        }
    }

    // Server health
    async function checkServer() {
        try {
            const res = await fetch('/health');
            const data = await res.json();
            document.getElementById('serverStatus').textContent = data.status === 'OK' ? '✅ Online' : '⚠️ Degraded';
        } catch {
            document.getElementById('serverStatus').textContent = '❌ Offline';
        }
    }
    checkServer();

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!apkInput.files.length) return;
        
        const formData = new FormData(form);
        statusDiv.className = 'loading';
        statusDiv.textContent = '⏳ Converting... (2-5 minutes)';
        statusDiv.style.display = 'block';
        progressDiv.style.display = 'block';
        progressBar.style.width = '0%';
        convertBtn.disabled = true;

        try {
            let p = 0;
            const interval = setInterval(() => { p += 5; if (p <= 90) progressBar.style.width = p + '%'; }, 500);
            const res = await fetch('/api/convert', { method: 'POST', body: formData });
            clearInterval(interval);
            progressBar.style.width = '100%';
            const data = await res.json();

            if (res.ok && data.success) {
                statusDiv.className = 'success';
                statusDiv.innerHTML = `
                    ✅ <strong>Done!</strong><br>
                    📦 ${data.aab} (${(data.size/1024/1024).toFixed(1)} MB)<br>
                    <a href="${data.download_url}" download>📥 Download AAB</a>
                `;
            } else {
                statusDiv.className = 'error';
                statusDiv.textContent = '❌ ' + (data.error || 'Unknown error');
            }
        } catch (err) {
            statusDiv.className = 'error';
            statusDiv.textContent = '❌ Network Error: ' + err.message;
        } finally {
            convertBtn.disabled = false;
            setTimeout(() => { progressDiv.style.display = 'none'; }, 2000);
        }
    });
</script>
</body>
</html>
